# Server Configuration
server.port=8082

# Database Configuration (MySQL setup - uncomment to use active MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/visavoyage_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Fallback In-Memory Database (H2) for instant out-of-the-box running
spring.datasource.url=jdbc:h2:mem:visavoyagedb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console Configuration (available at http://localhost:8081/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Security Config
visavoyage.jwt.secret=9a4f791490284812a0342a8b92b3a1a681d4a821e25e4c69348123e4210a421b
visavoyage.jwt.expirationMs=86400000
